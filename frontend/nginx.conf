server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── HTML: kein Cache ─────────────────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # ── Bilder ───────────────────────────────────────────────
    location ~* ^/assets/img/.*\.(avif|webp|jpe?g|png|gif|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── CSS + JS ─────────────────────────────────────────────
    location ~* ^/assets/(css|js)/.*\.(css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Fonts ────────────────────────────────────────────────
    location ~* ^/assets/fonts/.*\.(woff2?|ttf|otf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Manifest, Favicons, XML ──────────────────────────────
    location ~* \.(webmanifest|json|xml)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Fallback ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }
}