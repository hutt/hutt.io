load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # ── Brotli ───────────────────────────────────────────────
    brotli on;
    brotli_static on;
    brotli_comp_level 6;
    brotli_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        application/manifest+json font/woff2 image/svg+xml;

    # ── Gzip (Fallback) ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        application/manifest+json font/woff2 image/svg+xml;

    # ── Open File Cache ──────────────────────────────────────
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ── Security Header ──────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── HTML: kein Cache ─────────────────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # ── Bilder ───────────────────────────────────────────────
    location ~* ^/assets/img/.*\.(avif|webp|jpe?g|png|gif|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── CSS + JS ─────────────────────────────────────────────
    location ~* ^/assets/(css|js)/.*\.(css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Fonts ────────────────────────────────────────────────
    location ~* ^/assets/fonts/.*\.(woff2?|ttf|otf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Manifest, Favicons, XML ──────────────────────────────
    location ~* \.(webmanifest|json|xml)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Fallback ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }
}
