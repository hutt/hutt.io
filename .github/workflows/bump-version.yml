name: Bump package version

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    # Verhindert Endlosschleifen durch den vom Workflow selbst erzeugten Commit
    if: ${{ github.actor != 'github-actions[bot]' }}

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bump-Typ aus Commit-Message ermitteln
        id: bump
        shell: bash
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit-Message: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qi 'major'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qi 'minor'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Git konfigurieren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version erhöhen ohne Auto-Commit
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      - name: Neue Version auslesen
        id: version
        shell: bash
        run: |
          echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Versionsdateien committen
        run: |
          git add package.json
          if [ -f package-lock.json ]; then git add package-lock.json; fi
          git commit -m "chore: bump version to v${{ steps.version.outputs.value }}"

      - name: Tag anlegen
        run: |
          git tag "v${{ steps.version.outputs.value }}"

      - name: Commit und Tag pushen
        run: |
          git push origin master --tags