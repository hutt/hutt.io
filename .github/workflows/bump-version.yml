name: Bump package version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump-Typ aus Commit-Message ermitteln
        id: bump
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit-Message: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qi 'major'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qi 'minor'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Git konfigurieren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version erhöhen und Tag anlegen
        run: |
          npm version ${{ steps.bump.outputs.type }} -m "chore: bump version to %s [skip ci]"

      - name: Commit und Tag pushen
        run: |
          git push origin main --follow-tags