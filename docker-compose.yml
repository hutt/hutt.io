project_name: hutt-io

services:
  webhook:
    container_name: webhook
    build:
      context: ./webhook
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    volumes:
      - /opt/containers/hutt.io:/workspace
    healthcheck:
      test: ["CMD", "test", "-f", "/workspace/_site/index.html"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hutt-io-webhook.rule=(Host(`hutt.io`) || Host(`jannishutt.de`)) && Path(`/webhook`)"
      - "traefik.http.routers.hutt-io-webhook.entrypoints=websecure"
      - "traefik.http.routers.hutt-io-webhook.tls=true"
      - "traefik.http.routers.hutt-io-webhook.tls.certresolver=http_resolver"
      - "traefik.http.services.hutt-io-webhook.loadbalancer.server.port=9000"
      - "traefik.docker.network=proxy"
    networks:
      - proxy

  frontend:
    container_name: frontend
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      webhook:
        condition: service_healthy
    volumes:
      - ./_site:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hutt-io-insecure.rule=(Host(`hutt.io`) || Host(`jannishutt.de`))"
      - "traefik.http.routers.hutt-io-insecure.entrypoints=web"
      - "traefik.http.middlewares.hutt-io-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.hutt-io-insecure.middlewares=hutt-io-https-redirect"
      - "traefik.http.routers.hutt-io.rule=(Host(`hutt.io`) || Host(`jannishutt.de`))"
      - "traefik.http.routers.hutt-io.entrypoints=websecure"
      - "traefik.http.routers.hutt-io.tls=true"
      - "traefik.http.routers.hutt-io.tls.certresolver=http_resolver"
      - "traefik.http.routers.hutt-io.middlewares=cloudflarewarp@file"
      - "traefik.http.services.hutt-io-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
    networks:
      - proxy

  mailer:
    container_name: mailer
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      webhook:
        condition: service_healthy
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hutt-io-api.rule=(Host(`hutt.io`) || Host(`jannishutt.de`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.hutt-io-api.entrypoints=websecure"
      - "traefik.http.routers.hutt-io-api.tls=true"
      - "traefik.http.routers.hutt-io-api.tls.certresolver=http_resolver"
      - "traefik.http.routers.hutt-io-api.middlewares=cloudflarewarp@file"
      - "traefik.http.services.hutt-io-mailer.loadbalancer.server.port=8000"
      - "traefik.docker.network=proxy"
    networks:
      - proxy

networks:
  proxy:
    external: true